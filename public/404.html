<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <i class="fas fa-link error-icon"></i>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Link Not Found</h2>
            <p class="error-message">The short link you're looking for doesn't exist or has expired.</p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    Go Home
                </a>
                <a href="/dashboard.html" class="btn btn-outline">
                    <i class="fas fa-chart-line"></i>
                    Dashboard
                </a>
            </div>
        </div>
    </div>

    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, var(--dark-surface), var(--dark-bg));
        }
        
        .error-content {
            max-width: 500px;
            padding: 2rem;
        }
        
        .error-icon {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        .error-title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .error-message {
            color: var(--gray-text);
            margin-bottom: 2rem;
        }
        
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</body>
</html>
